<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<title>SR Psd</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="stock_data.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:0;
overflow-x:hidden;
}

.header{
background:#3c64a5;
color:white;
text-align:center;
padding:18px;
font-size:26px;
font-weight:bold;
position:relative;
}

.adminBtn{
position:absolute;
right:15px;
top:15px;
background:#222;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
}

.container{
width:100%;
max-width:1000px;
margin:auto;
padding:15px;
}

.searchbox{
width:100%;
padding:14px;
font-size:16px;
border-radius:6px;
border:1px solid #aaa;
margin-bottom:10px;
}

.live{
text-align:center;
margin:10px;
color:#555;
}

.results{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:12px;
}

.card{
background:white;
border-left:6px solid #3c64a5;
padding:14px;
border-radius:6px;
}

.price{
margin-top:10px;
display:flex;
flex-wrap:wrap;
gap:6px;
}

.tag{
padding:4px 8px;
border-radius:4px;
color:white;
font-size:13px;
}

.mrp{background:#1e73be;}
.sale{background:#28a745;}
.ws{background:#d73a49;}
.purchase{background:#333;}

.stock{
background:#f1c40f;
color:black;
padding:4px 8px;
border-radius:4px;
display:inline-block;
margin-top:8px;
}

</style>

</head>

<body>

<div class="header">

SR Psd

<button class="adminBtn" onclick="adminLogin()">
Admin
</button>

</div>

<div class="container">

<input type="text"
id="search"
class="searchbox"
placeholder="Search by name, barcode, or group..."
onkeyup="searchProduct()">

<div class="live">
● Live: <span id="time"></span> |
<span id="count"></span> items
</div>

<div id="results" class="results"></div>

</div>

<script>

let adminMode=false

function adminLogin(){

let pass=prompt("Enter Admin Password")

if(pass==="7865"){
adminMode=true
alert("Admin Mode Enabled")
searchProduct()
}else{
alert("Wrong Password")
}

}

function updateTime(){

let now=new Date()

document.getElementById("time").innerText=
now.toLocaleTimeString()

document.getElementById("count").innerText=
STOCK_DATA.length

}

setInterval(updateTime,1000)
updateTime()

function searchProduct(){

let q=document.getElementById("search").value.toLowerCase()

let html=""

let results=STOCK_DATA.filter(p=>
p.name.toLowerCase().includes(q) ||
(p.barcode && p.barcode.includes(q)) ||
(p.group && p.group.toLowerCase().includes(q))
)

results.forEach(p=>{

html+=`
<div class="card">

<b>${p.name}</b><br>
${p.barcode || ""}

<div class="price">

<span class="tag mrp">
MRP ₹${p.mrp}
</span>

<span class="tag sale">
Sale ₹${p.sale}
</span>

<span class="tag ws">
WS ₹${p.wholesale}
</span>

${adminMode ? `
<span class="tag purchase">
Purchase ₹${p.wholesale}
</span>
` : ""}

</div>

<div class="stock">
Stock: ${p.stock}
</div>

</div>
`

})

document.getElementById("results").innerHTML=html

}

searchProduct()

</script>

</body>
</html>
