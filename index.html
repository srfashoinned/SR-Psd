<script>

let filtered = []

window.onload = function(){

if(typeof STOCK_DATA === "undefined"){
document.getElementById("results").innerHTML = "Stock data not loaded"
return
}

filtered = [...STOCK_DATA]

render()

}

function render(){

let html = ""

for(let p of filtered.slice(0,200)){

html += `
<div class="card">

<b>${p.name}</b><br>
${p.barcode || ""}

<div class="price">

<span class="mrp">MRP ₹${p.mrp}</span>
<span class="sale">Sale ₹${p.sale}</span>
<span class="ws">WS ₹${p.wholesale}</span>

</div>

<div class="stock">
Stock: ${p.stock}
</div>

</div>
`

}

document.getElementById("results").innerHTML = html

}

function searchItems(){

let q = document.getElementById("search").value.toLowerCase()

filtered = STOCK_DATA.filter(p =>

(p.name && p.name.toLowerCase().includes(q)) ||
(p.barcode && p.barcode.includes(q))

)

render()

}

</script>
