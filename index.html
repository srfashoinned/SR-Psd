<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SR Fashion - Cloud POS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            padding: 15px;
        }

        /* Header */
        .header {
            background: linear-gradient(145deg, #1a1a1a 0%, #000000 100%);
            border-bottom: 3px solid #ffd700;
            padding: 15px 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo h1 {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo p {
            color: #888;
            font-size: 12px;
        }

        .sync-status {
            background: #1a1a1a;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #333;
            font-size: 14px;
        }

        .sync-status.online {
            color: #00ff00;
            border-color: #00ff00;
        }

        /* Search Section */
        .search-section {
            background: #111;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #333;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 1;
            min-width: 200px;
            padding: 15px;
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #ffd700;
        }

        .search-box button {
            padding: 15px 30px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .search-box button:hover {
            background: #ffed4a;
            transform: translateY(-2px);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            background: #222;
            border: 1px solid #333;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #ffd700;
            color: #000;
            border-color: #ffd700;
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
        }

        /* Items Grid */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 5px;
        }

        .item-card {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .item-card:hover {
            border-color: #ffd700;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.1);
        }

        .item-card.low-stock {
            border-left: 4px solid #ff0000;
        }

        .item-name {
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 16px;
            padding-right: 30px;
        }

        .item-alias {
            color: #666;
            font-size: 12px;
            margin-bottom: 10px;
        }

        .item-prices {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .price {
            font-size: 14px;
        }

        .price.mrp {
            color: #888;
            text-decoration: line-through;
        }

        .price.sale {
            color: #00ff00;
            font-weight: bold;
        }

        .price.wholesale {
            color: #4169e1;
            font-weight: bold;
        }

        .item-stock {
            font-size: 13px;
            padding: 5px 10px;
            background: #222;
            border-radius: 5px;
            display: inline-block;
        }

        .stock-low {
            color: #ff0000;
        }

        .stock-medium {
            color: #ffa500;
        }

        .stock-high {
            color: #00ff00;
        }

        .admin-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ffd700;
            font-size: 12px;
            opacity: 0.7;
        }

        /* Cart Section */
        .cart-section {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            position: sticky;
            top: 20px;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
        }

        .cart-header {
            border-bottom: 2px solid #ffd700;
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        .cart-header h2 {
            color: #ffd700;
            font-size: 20px;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .cart-item {
            background: #222;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            position: relative;
        }

        .cart-item-name {
            font-weight: bold;
            margin-bottom: 8px;
            padding-right: 25px;
        }

        .cart-item-details {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .cart-item-price {
            color: #ffd700;
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cart-item-qty button {
            width: 30px;
            height: 30px;
            border-radius: 5px;
            border: none;
            background: #333;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }

        .cart-item-qty button:hover {
            background: #ffd700;
            color: #000;
        }

        .cart-item-qty span {
            min-width: 30px;
            text-align: center;
        }

        .cart-item-remove {
            position: absolute;
            top: 8px;
            right: 8px;
            color: #ff0000;
            cursor: pointer;
            font-size: 18px;
        }

        .cart-total {
            border-top: 2px solid #333;
            padding-top: 15px;
        }

        .cart-total-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 18px;
        }

        .cart-total-row.grand {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
        }

        .cart-actions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
        }

        .cart-btn {
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .btn-print {
            background: #333;
            color: #fff;
        }

        .btn-pdf {
            background: #ff0000;
            color: #fff;
        }

        .btn-excel {
            background: #00ff00;
            color: #000;
        }

        .btn-whatsapp {
            background: #25D366;
            color: #fff;
        }

        .btn-clear {
            background: #dc3545;
            color: #fff;
        }

        .cart-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* Admin Panel */
        .admin-panel {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            display: none;
        }

        .admin-panel.visible {
            display: block;
        }

        .admin-header {
            color: #ffd700;
            margin-bottom: 15px;
        }

        .admin-form {
            display: grid;
            gap: 15px;
        }

        .admin-form input,
        .admin-form select {
            padding: 12px;
            background: #222;
            border: 1px solid #333;
            border-radius: 5px;
            color: #fff;
        }

        .admin-form button {
            padding: 12px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Login Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.visible {
            display: flex;
        }

        .modal-content {
            background: #111;
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content h2 {
            color: #ffd700;
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: #222;
            border: 1px solid #333;
            border-radius: 5px;
            color: #fff;
        }

        .modal-content button {
            width: 100%;
            padding: 15px;
            background: #ffd700;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .cart-section {
                position: static;
                max-height: none;
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            .search-box button {
                width: 100%;
            }
            
            .items-grid {
                grid-template-columns: 1fr;
            }
            
            .cart-actions {
                grid-template-columns: 1fr;
            }
        }

        /* Loading Spinner */
        .loading {
            text-align: center;
            padding: 50px;
        }

        .spinner {
            border: 4px solid #333;
            border-top: 4px solid #ffd700;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Scanner Modal */
        .scanner-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .scanner-modal.visible {
            display: flex;
        }

        .scanner-container {
            width: 90%;
            max-width: 500px;
            background: #111;
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 20px;
        }

        #scanner {
            width: 100%;
            height: auto;
        }

        .close-scanner {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
    
    <!-- QR Code Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="logo">
            <h1>SR FASHION</h1>
            <p>Cloud POS System</p>
        </div>
        <div class="sync-status" id="syncStatus">
            <span>⏺ Loading...</span>
        </div>
        <div>
            <button class="filter-btn" onclick="showScanner()">📷 Scan Barcode</button>
            <button class="filter-btn" onclick="showLoginModal()">👤 Admin</button>
        </div>
    </div>

    <!-- Search Section -->
    <div class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by item name or barcode..." onkeyup="filterItems()">
            <button onclick="filterItems()">🔍 Search</button>
            <button onclick="clearSearch()" style="background: #333; color: #fff;">✖ Clear</button>
        </div>
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterByStock('all')">All Items</button>
            <button class="filter-btn" onclick="filterByStock('low')">Low Stock</button>
            <button class="filter-btn" onclick="filterByStock('in')">In Stock</button>
            <button class="filter-btn" onclick="filterByStock('out')">Out of Stock</button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Items Grid -->
        <div id="itemsContainer" class="items-grid">
            <!-- Items will be loaded here -->
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading inventory...</p>
            </div>
        </div>

        <!-- Cart Section -->
        <div class="cart-section">
            <div class="cart-header">
                <h2>🛒 Quotation Cart</h2>
            </div>
            
            <div class="cart-items" id="cartItems">
                <!-- Cart items will appear here -->
                <div style="text-align: center; color: #666; padding: 20px;">
                    Cart is empty
                </div>
            </div>
            
            <div class="cart-total">
                <div class="cart-total-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">₹0</span>
                </div>
                <div class="cart-total-row grand">
                    <span>Grand Total:</span>
                    <span id="grandTotal">₹0</span>
                </div>
            </div>
            
            <div class="cart-actions">
                <button class="cart-btn btn-print" onclick="printQuotation()">🖨️ Print</button>
                <button class="cart-btn btn-pdf" onclick="downloadPDF()">📄 PDF</button>
                <button class="cart-btn btn-excel" onclick="downloadExcel()">📊 Excel</button>
                <button class="cart-btn btn-whatsapp" onclick="shareWhatsApp()">📱 WhatsApp</button>
                <button class="cart-btn btn-clear" onclick="clearCart()">🗑️ Clear Cart</button>
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
        <h3 class="admin-header">⚙️ Admin Controls</h3>
        <div class="admin-form">
            <input type="text" id="newItemName" placeholder="Item Name">
            <input type="text" id="newItemBarcode" placeholder="Barcode">
            <input type="number" id="newItemMrp" placeholder="MRP">
            <input type="number" id="newItemSale" placeholder="Sale Price">
            <input type="number" id="newItemWholesale" placeholder="Wholesale Price">
            <input type="number" id="newItemStock" placeholder="Stock">
            <button onclick="addNewItem()">Add Item</button>
        </div>
        <hr style="border-color: #333; margin: 20px 0;">
        <h4 style="color: #ffd700;">Purchase Prices (Admin Only)</h4>
        <div id="purchasePrices">
            <!-- Purchase prices will be shown here -->
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>Admin Login</h2>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="adminLogin()">Login</button>
            <button onclick="hideLoginModal()" style="background: #333; margin-top: 10px;">Cancel</button>
        </div>
    </div>

    <!-- Scanner Modal -->
    <div class="scanner-modal" id="scannerModal">
        <div class="scanner-container">
            <span class="close-scanner" onclick="hideScanner()">&times;</span>
            <h3 style="color: #ffd700; margin-bottom: 15px;">Scan Barcode</h3>
            <div id="scanner"></div>
        </div>
    </div>

    <script>
        // Global variables
        let allItems = [];
        let filteredItems = [];
        let cart = [];
        let isAdmin = false;
        let lastUpdated = null;
        let html5QrcodeScanner = null;

        // Load items on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadItems();
            // Auto refresh every 60 seconds
            setInterval(loadItems, 60000);
        });

        // Load items from JSON
        async function loadItems() {
            try {
                const response = await fetch('items.json?t=' + new Date().getTime());
                const data = await response.json();
                
                if (data.items) {
                    allItems = data.items;
                    filteredItems = allItems;
                    lastUpdated = data.last_updated;
                    
                    updateSyncStatus(true);
                    displayItems();
                }
            } catch (error) {
                console.error('Error loading items:', error);
                updateSyncStatus(false);
                
                document.getElementById('itemsContainer').innerHTML = `
                    <div style="text-align: center; padding: 50px; color: #ff0000;">
                        <h3>❌ Error loading inventory</h3>
                        <p>Please check connection</p>
                    </div>
                `;
            }
        }

        // Update sync status
        function updateSyncStatus(online) {
            const status = document.getElementById('syncStatus');
            if (online && lastUpdated) {
                const date = new Date(lastUpdated);
                status.className = 'sync-status online';
                status.innerHTML = `✅ Live • Updated: ${date.toLocaleTimeString()}`;
            } else {
                status.className = 'sync-status';
                status.innerHTML = '❌ Offline';
            }
        }

        // Display items
        function displayItems() {
            const container = document.getElementById('itemsContainer');
            
            if (filteredItems.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 50px; color: #666;">
                        <h3>No items found</h3>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = filteredItems.map(item => {
                const stockClass = getStockClass(item.Stock);
                const lowStockClass = item.Stock < 10 ? 'low-stock' : '';
                
                // Format prices
                const mrp = parseFloat(item.Item_MRP || 0).toFixed(2);
                const salePrice = parseFloat(item.Item_Sale_Price || 0).toFixed(2);
                const wholesalePrice = parseFloat(item.Item_Wholesale_Price || 0).toFixed(2);
                const purchasePrice = parseFloat(item.Item_Purchase_Price || 0).toFixed(2);
                
                return `
                    <div class="item-card ${lowStockClass}" onclick="addToCart('${item.ItemName.replace(/'/g, "\\'")}')">
                        <div class="item-name">${item.ItemName || 'Unnamed'}</div>
                        <div class="item-alias">${item.ItemAlias || 'No barcode'}</div>
                        <div class="item-prices">
                            <span class="price mrp">₹${mrp}</span>
                            <span class="price sale">₹${salePrice}</span>
                            <span class="price wholesale">₹${wholesalePrice}</span>
                        </div>
                        <div class="item-stock ${stockClass}">
                            Stock: ${item.Stock || 0}
                        </div>
                        ${isAdmin ? '<div class="admin-badge">⚙️</div>' : ''}
                        ${isAdmin ? `<div style="font-size: 11px; color: #888; margin-top: 5px;">
                            Purchase: ₹${purchasePrice}
                        </div>` : ''}
                    </div>
                `;
            }).join('');
        }

        // Get stock class
        function getStockClass(stock) {
            if (stock <= 0) return 'stock-low';
            if (stock < 10) return 'stock-low';
            if (stock < 50) return 'stock-medium';
            return 'stock-high';
        }

        // Filter items
        function filterItems() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            filteredItems = allItems.filter(item => {
                return (item.ItemName && item.ItemName.toLowerCase().includes(searchTerm)) ||
                       (item.ItemAlias && item.ItemAlias.toLowerCase().includes(searchTerm));
            });
            
            displayItems();
        }

        // Clear search
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            filteredItems = allItems;
            displayItems();
        }

        // Filter by stock
        function filterByStock(type) {
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            switch(type) {
                case 'low':
                    filteredItems = allItems.filter(item => item.Stock < 10 && item.Stock > 0);
                    break;
                case 'in':
                    filteredItems = allItems.filter(item => item.Stock > 0);
                    break;
                case 'out':
                    filteredItems = allItems.filter(item => item.Stock <= 0);
                    break;
                default:
                    filteredItems = allItems;
            }
            
            displayItems();
        }

        // Add to cart
        function addToCart(itemName) {
            const item = allItems.find(i => i.ItemName === itemName);
            if (!item) return;
            
            const existingItem = cart.find(i => i.ItemName === itemName);
            
            if (existingItem) {
                if (existingItem.quantity < item.Stock) {
                    existingItem.quantity++;
                } else {
                    alert('Insufficient stock!');
                    return;
                }
            } else {
                cart.push({
                    ItemName: item.ItemName,
                    ItemAlias: item.ItemAlias,
                    SalePrice: item.Item_Sale_Price,
                    WholesalePrice: item.Item_Wholesale_Price,
                    quantity: 1,
                    priceType: 'sale' // default to sale price
                });
            }
            
            updateCart();
        }

        // Update cart display
        function updateCart() {
            const cartContainer = document.getElementById('cartItems');
            let subtotal = 0;
            
            if (cart.length === 0) {
                cartContainer.innerHTML = '<div style="text-align: center; color: #666; padding: 20px;">Cart is empty</div>';
            } else {
                cartContainer.innerHTML = cart.map((item, index) => {
                    const price = item.priceType === 'sale' ? item.SalePrice : item.WholesalePrice;
                    const total = price * item.quantity;
                    subtotal += total;
                    
                    return `
                        <div class="cart-item">
                            <div class="cart-item-name">${item.ItemName}</div>
                            <div class="cart-item-details">
                                <div class="cart-item-price">
                                    ₹${price.toFixed(2)} × ${item.quantity}
                                    <br>
                                    <small>Total: ₹${total.toFixed(2)}</small>
                                </div>
                                <div class="cart-item-qty">
                                    <button onclick="updateCartItem(${index}, -1)">-</button>
                                    <span>${item.quantity}</span>
                                    <button onclick="updateCartItem(${index}, 1)">+</button>
                                </div>
                            </div>
                            <div class="cart-item-remove" onclick="removeFromCart(${index})">×</div>
                            <div style="margin-top: 5px;">
                                <select onchange="changePriceType(${index}, this.value)" style="background: #333; color: #fff; border: none; padding: 3px;">
                                    <option value="sale" ${item.priceType === 'sale' ? 'selected' : ''}>Sale Price</option>
                                    <option value="wholesale" ${item.priceType === 'wholesale' ? 'selected' : ''}>Wholesale</option>
                                </select>
                            </div>
                        </div>
                    `;
                }).join('');
            }
            
            // Update totals
            document.getElementById('subtotal').innerText = `₹${subtotal.toFixed(2)}`;
            document.getElementById('grandTotal').innerText = `₹${subtotal.toFixed(2)}`;
        }

        // Update cart item quantity
        function updateCartItem(index, change) {
            const item = cart[index];
            const stockItem = allItems.find(i => i.ItemName === item.ItemName);
            
            item.quantity += change;
            
            if (item.quantity <= 0) {
                cart.splice(index, 1);
            } else if (item.quantity > stockItem.Stock) {
                item.quantity = stockItem.Stock;
                alert('Maximum stock reached!');
            }
            
            updateCart();
        }

        // Remove from cart
        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        // Change price type
        function changePriceType(index, type) {
            cart[index].priceType = type;
            updateCart();
        }

        // Clear cart
        function clearCart() {
            if (confirm('Clear all items from cart?')) {
                cart = [];
                updateCart();
            }
        }

        // Print quotation
        function printQuotation() {
            if (cart.length === 0) {
                alert('Cart is empty!');
                return;
            }
            
            const printWindow = window.open('', '_blank');
            printWindow.document.write(`
                <html>
                <head>
                    <title>SR Fashion - Quotation</title>
                    <style>
                        body { font-family: Arial; padding: 20px; }
                        h1 { color: #ffd700; }
                        table { width: 100%; border-collapse: collapse; }
                        th { background: #000; color: #ffd700; padding: 10px; }
                        td { padding: 10px; border-bottom: 1px solid #ddd; }
                        .total { font-size: 20px; font-weight: bold; margin-top: 20px; }
                    </style>
                </head>
                <body>
                    <h1>SR FASHION</h1>
                    <p>Date: ${new Date().toLocaleString()}</p>
                    <hr>
                    <table>
                        <tr>
                            <th>Item</th>
                            <th>Price</th>
                            <th>Qty</th>
                            <th>Total</th>
                        </tr>
                        ${cart.map(item => {
                            const price = item.priceType === 'sale' ? item.SalePrice : item.WholesalePrice;
                            return `
                                <tr>
                                    <td>${item.ItemName}</td>
                                    <td>₹${price.toFixed(2)}</td>
                                    <td>${item.quantity}</td>
                                    <td>₹${(price * item.quantity).toFixed(2)}</td>
                                </tr>
                            `;
                        }).join('')}
                    </table>
                    <div class="total">
                        Grand Total: ₹${cart.reduce((sum, item) => {
                            const price = item.priceType === 'sale' ? item.SalePrice : item.WholesalePrice;
                            return sum + (price * item.quantity);
                        }, 0).toFixed(2)}
                    </div>
                </body>
                </html>
            `);
            printWindow.document.close();
            printWindow.print();
        }

        // Share via WhatsApp
        function shareWhatsApp() {
            if (cart.length === 0) {
                alert('Cart is empty!');
                return;
            }
            
            let message = "*SR FASHION - Quotation*\n\n";
            cart.forEach(item => {
                const price = item.priceType === 'sale' ? item.SalePrice : item.WholesalePrice;
                message += `${item.ItemName}\n`;
                message += `₹${price.toFixed(2)} x ${item.quantity} = ₹${(price * item.quantity).toFixed(2)}\n\n`;
            });
            
            const total = cart.reduce((sum, item) => {
                const price = item.priceType === 'sale' ? item.SalePrice : item.WholesalePrice;
                return sum + (price * item.quantity);
            }, 0);
            
            message += `*Grand Total: ₹${total.toFixed(2)}*`;
            
            window.open(`https://wa.me/?text=${encodeURIComponent(message)}`, '_blank');
        }

        // Download Excel (CSV)
        function downloadExcel() {
            if (cart.length === 0) {
                alert('Cart is empty!');
                return;
            }
            
            let csv = "Item,Price,Quantity,Total\n";
            cart.forEach(item => {
                const price = item.priceType === 'sale' ? item.SalePrice : item.WholesalePrice;
                csv += `"${item.ItemName}",${price},${item.quantity},${price * item.quantity}\n`;
            });
            
            const total = cart.reduce((sum, item) => {
                const price = item.priceType === 'sale' ? item.SalePrice : item.WholesalePrice;
                return sum + (price * item.quantity);
            }, 0);
            csv += `,,,"Grand Total: ${total}"`;
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `quotation_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
        }

        // Download PDF (simplified - opens print dialog)
        function downloadPDF() {
            printQuotation();
        }

        // Show scanner
        function showScanner() {
            document.getElementById('scannerModal').classList.add('visible');
            
            html5QrcodeScanner = new Html5QrcodeScanner(
                "scanner", 
                { fps: 10, qrbox: 250 },
                false
            );
            
            html5QrcodeScanner.render(onScanSuccess, onScanError);
        }

        // Hide scanner
        function hideScanner() {
            document.getElementById('scannerModal').classList.remove('visible');
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear();
            }
        }

        // Scan success
        function onScanSuccess(decodedText, decodedResult) {
            // Search for barcode
            const item = allItems.find(i => i.ItemAlias === decodedText);
            if (item) {
                addToCart(item.ItemName);
                hideScanner();
            } else {
                alert('Item not found!');
            }
        }

        function onScanError(error) {
            console.warn(`Scan error: ${error}`);
        }

        // Show login modal
        function showLoginModal() {
            document.getElementById('loginModal').classList.add('visible');
        }

        // Hide login modal
        function hideLoginModal() {
            document.getElementById('loginModal').classList.remove('visible');
        }

        // Admin login
        function adminLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            // Admin credentials
            if (username === 'admin' && password === 'sradmin') {
                isAdmin = true;
                document.getElementById('adminPanel').classList.add('visible');
                hideLoginModal();
                
                // Show purchase prices
                showPurchasePrices();
                
                // Refresh display to show admin badges
                displayItems();
                
                alert('Admin login successful!');
            } else {
                alert('Invalid credentials!');
            }
        }

        // Show purchase prices (admin only)
        function showPurchasePrices() {
            const container = document.getElementById('purchasePrices');
            container.innerHTML = allItems.map(item => `
                <div style="background: #222; padding: 10px; margin: 5px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <span style="color: #ffd700;">${item.ItemName}</span>
                        <br>
                        <small style="color: #666;">${item.ItemAlias || 'No barcode'}</small>
                    </div>
                    <div style="text-align: right;">
                        <div style="color: #ff6b6b;">Purchase: ₹${parseFloat(item.Item_Purchase_Price || 0).toFixed(2)}</div>
                        <div style="color: #888; font-size: 12px;">Wholesale: ₹${parseFloat(item.Item_Wholesale_Price || 0).toFixed(2)}</div>
                        <div style="color: #00ff00; font-size: 12px;">Sale: ₹${parseFloat(item.Item_Sale_Price || 0).toFixed(2)}</div>
                    </div>
                </div>
            `).join('');
        }

        // Add new item (admin only)
        function addNewItem() {
            if (!isAdmin) return;
            
            const newItem = {
                ItemName: document.getElementById('newItemName').value,
                ItemAlias: document.getElementById('newItemBarcode').value,
                Item_MRP: parseFloat(document.getElementById('newItemMrp').value) || 0,
                Item_Sale_Price: parseFloat(document.getElementById('newItemSale').value) || 0,
                Item_Wholesale_Price: parseFloat(document.getElementById('newItemWholesale').value) || 0,
                Stock: parseInt(document.getElementById('newItemStock').value) || 0
            };
            
            // Add to array
            allItems.push(newItem);
            filteredItems = allItems;
            displayItems();
            
            // Clear form
            document.getElementById('newItemName').value = '';
            document.getElementById('newItemBarcode').value = '';
            document.getElementById('newItemMrp').value = '';
            document.getElementById('newItemSale').value = '';
            document.getElementById('newItemWholesale').value = '';
            document.getElementById('newItemStock').value = '';
            
            alert('Item added successfully!');
        }
    </script>
</body>
</html>
