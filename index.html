<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<title>SR Psd</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
overflow-x:hidden;
}

.header{
background:#3c64a5;
color:white;
padding:16px;
text-align:center;
font-size:24px;
font-weight:bold;
position:relative;
}

.admin{
position:absolute;
right:10px;
top:12px;
background:black;
color:white;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

.container{
max-width:1100px;
margin:auto;
padding:15px;
}

.search{
width:100%;
padding:14px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:10px;
}

.live{
text-align:center;
margin:10px;
color:#555;
}

.results{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:12px;
}

.card{
background:white;
border-left:5px solid #3c64a5;
padding:12px;
border-radius:6px;
}

.price{
margin-top:8px;
display:flex;
flex-wrap:wrap;
gap:5px;
}

.tag{
padding:3px 8px;
font-size:13px;
color:white;
border-radius:4px;
}

.mrp{background:#1e73be;}
.sale{background:#28a745;}
.ws{background:#d73a49;}
.purchase{background:#444;}

.stock{
background:#f1c40f;
color:black;
padding:3px 8px;
border-radius:4px;
display:inline-block;
margin-top:6px;
}

</style>

</head>

<body>

<div class="header">
SR Psd
<button class="admin" onclick="adminLogin()">Admin</button>
</div>

<div class="container">

<input
type="text"
id="search"
class="search"
placeholder="Search by name, barcode or group..."
oninput="searchItems()"
/>

<div class="live">
● Live: <span id="time"></span> |
<span id="count"></span> items
</div>

<div id="results" class="results"></div>

</div>

<script>

let STOCK_DATA=[]
let admin=false

async function loadStock(){

const res=await fetch("stock_data.js?"+Date.now())
const text=await res.text()

eval(text)

render(STOCK_DATA)

}

function adminLogin(){

let pass=prompt("Enter Admin Password")

if(pass==="7865"){
admin=true
alert("Admin Mode Enabled")
render(STOCK_DATA)
}else{
alert("Wrong Password")
}

}

function render(list){

let html=""

for(let i=0;i<list.length;i++){

let p=list[i]

html+=`
<div class="card">

<b>${p.name}</b><br>
${p.barcode||""}

<div class="price">

<span class="tag mrp">
MRP ₹${p.mrp}
</span>

<span class="tag sale">
Sale ₹${p.sale}
</span>

<span class="tag ws">
WS ₹${p.wholesale}
</span>

${admin ? `<span class="tag purchase">Purchase ₹${p.wholesale}</span>` : ""}

</div>

<div class="stock">
Stock: ${p.stock}
</div>

</div>
`

}

document.getElementById("results").innerHTML=html

}

function searchItems(){

let q=document.getElementById("search").value.toLowerCase()

if(q===""){
render(STOCK_DATA)
return
}

let results=[]

for(let i=0;i<STOCK_DATA.length;i++){

let p=STOCK_DATA[i]

if(
(p.name && p.name.toLowerCase().includes(q)) ||
(p.barcode && p.barcode.includes(q)) ||
(p.group && p.group.toLowerCase().includes(q))
){
results.push(p)
}

}

render(results)

}

function updateTime(){

document.getElementById("time").innerText=
new Date().toLocaleTimeString()

document.getElementById("count").innerText=
STOCK_DATA.length

}

setInterval(updateTime,1000)

loadStock()

setInterval(loadStock,90000)

</script>

</body>
</html>
